<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Handwriting Animator — Demo</title>
   <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
         font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
         background: #f5f5f0;
         display: flex;
         flex-direction: column;
         align-items: center;
         min-height: 100vh;
         padding: 32px 16px;
         gap: 24px;
      }

      h1 {
         font-size: 22px;
         font-weight: 300;
         color: #333;
         letter-spacing: 1px;
      }

      /* ── Canvas ─────────────────────────────────────────────── */
      #canvas-container {
         background: white;
         border-radius: 12px;
         box-shadow: 0 4px 24px rgba(0,0,0,0.08);
         overflow: hidden;
         width: 100%;
         max-width: 900px;
      }

      #output-canvas {
         display: block;
         width: 100%;
         height: 180px;
      }

      /* ── Controls ───────────────────────────────────────────── */
      #controls {
         width: 100%;
         max-width: 900px;
         display: flex;
         flex-direction: column;
         gap: 14px;
      }

      .row {
         display: flex;
         gap: 10px;
         align-items: center;
      }

      #text-input {
         flex: 1;
         padding: 12px 14px;
         font-size: 18px;
         border: 2px solid #ddd;
         border-radius: 10px;
         background: white;
         outline: none;
         transition: border-color 0.2s;
      }
      #text-input:focus { border-color: #4a90d9; }

      #btn-animate {
         padding: 12px 24px;
         background: #4a90d9;
         color: white;
         border: none;
         border-radius: 10px;
         font-size: 16px;
         font-weight: 600;
         cursor: pointer;
         transition: background 0.2s;
      }
      #btn-animate:hover  { background: #3a7fc8; }
      #btn-animate:active { background: #2a6fb8; }

      #btn-clear {
         padding: 12px 18px;
         background: #eee;
         color: #555;
         border: none;
         border-radius: 10px;
         font-size: 15px;
         cursor: pointer;
      }

      .control-group {
         display: flex;
         flex-wrap: wrap;
         gap: 20px;
         background: white;
         padding: 14px 16px;
         border-radius: 10px;
         border: 1px solid #e8e8e8;
      }

      .control-item {
         display: flex;
         flex-direction: column;
         gap: 4px;
         min-width: 160px;
      }

      .control-item label {
         font-size: 12px;
         color: #888;
         text-transform: uppercase;
         letter-spacing: 0.5px;
      }

      .control-item .value-row {
         display: flex;
         align-items: center;
         gap: 8px;
      }

      input[type=range] {
         flex: 1;
         accent-color: #4a90d9;
      }

      .val-display {
         font-size: 14px;
         color: #333;
         min-width: 32px;
         text-align: right;
      }

      .scale-btns {
         display: flex;
         gap: 6px;
      }

      .scale-btn {
         padding: 5px 14px;
         border: 2px solid #ddd;
         border-radius: 6px;
         background: white;
         cursor: pointer;
         font-size: 14px;
         color: #555;
         transition: all 0.15s;
      }
      .scale-btn.active {
         border-color: #4a90d9;
         background: #4a90d9;
         color: white;
      }

      /* ── Data source ────────────────────────────────────────── */
      #data-source {
         width: 100%;
         max-width: 900px;
         background: white;
         border-radius: 10px;
         border: 1px solid #e8e8e8;
         padding: 14px 16px;
      }

      #data-source h3 {
         font-size: 13px;
         color: #888;
         text-transform: uppercase;
         letter-spacing: 0.5px;
         margin-bottom: 10px;
      }

      .source-row {
         display: flex;
         gap: 10px;
         align-items: center;
         flex-wrap: wrap;
      }

      #api-url {
         flex: 1;
         min-width: 200px;
         padding: 8px 12px;
         font-size: 14px;
         border: 1px solid #ddd;
         border-radius: 8px;
         background: #fafafa;
      }

      #set-select {
         padding: 8px 12px;
         font-size: 14px;
         border: 1px solid #ddd;
         border-radius: 8px;
         background: white;
      }

      #btn-load {
         padding: 8px 16px;
         background: #555;
         color: white;
         border: none;
         border-radius: 8px;
         font-size: 14px;
         cursor: pointer;
      }

      #status {
         font-size: 13px;
         color: #888;
         margin-top: 6px;
      }
      #status.ok  { color: #34c759; }
      #status.err { color: #ff3b30; }
   </style>
</head>
<body>
   <h1>Handwriting Animator</h1>

   <!-- Canvas output -->
   <div id="canvas-container">
      <canvas id="output-canvas"></canvas>
   </div>

   <!-- Controls -->
   <div id="controls">
      <div class="row">
         <input type="text" id="text-input" placeholder="Type something to animate…" value="Hello world">
         <button id="btn-animate">Animate</button>
         <button id="btn-clear">Clear</button>
      </div>

      <div class="control-group">
         <div class="control-item">
            <label>Speed</label>
            <div class="value-row">
               <input type="range" id="speed-slider" min="0.5" max="3" step="0.1" value="1.5">
               <span class="val-display" id="speed-val">1.5×</span>
            </div>
         </div>

         <div class="control-item">
            <label>Cap Height (px)</label>
            <div class="value-row">
               <input type="range" id="cap-height-slider" min="40" max="160" step="4" value="80">
               <span class="val-display" id="cap-height-val">80px</span>
            </div>
         </div>

         <div class="control-item">
            <label>Render Scale</label>
            <div class="value-row scale-btns">
               <button class="scale-btn" data-scale="1">1×</button>
               <button class="scale-btn active" data-scale="2">2×</button>
               <button class="scale-btn" data-scale="3">3×</button>
            </div>
         </div>
      </div>
   </div>

   <!-- Data source -->
   <div id="data-source">
      <h3>Glyph Set Source</h3>
      <div class="source-row">
         <input type="text" id="api-url" value="http://localhost:8080/api" placeholder="API base URL">
         <select id="set-select"><option value="">— load sets —</option></select>
         <button id="btn-load">Load</button>
      </div>
      <div id="status">No glyph set loaded. Using built-in sample data.</div>
   </div>

   <!-- Inline script — no build step needed for demo -->
   <script type="module">
      // ── Inline playback engine (copy of compiled output) ─────────────────
      // For dev convenience the demo can import the TS source via a bundler,
      // or load the built JS from ../playback/dist/handwriting-animator.js.
      // Here we inline a minimal self-contained version for zero-setup demo.

      class HandwritingAnimator {
         constructor(canvas, glyphSet) {
            this.canvas   = canvas;
            this.glyphSet = glyphSet;
            this.lastUsed = new Map();
            const ctx = canvas.getContext('2d');
            if(!ctx) throw new Error('No 2d context');
            this.ctx = ctx;
         }

         write(text, options = {}) {
            const opts = {
               speed:     options.speed     ?? 1.5,
               color:     options.color     ?? '#1a1a1a',
               minWidth:  options.minWidth  ?? 2,
               maxWidth:  options.maxWidth  ?? 4,
               scale:     options.scale     ?? 2,
               letterGap: options.letterGap ?? 0.05,
               wordGap:   options.wordGap   ?? 0.35,
               capHeight: options.capHeight ?? 80,
            };
            this._prepareCanvas(opts);
            const seq = this._buildSequence(text, opts);
            if(seq.length === 0) return Promise.resolve();
            return this._animate(seq, opts);
         }

         _prepareCanvas(opts) {
            const cssW = this.canvas.clientWidth  || this.canvas.width;
            const cssH = this.canvas.clientHeight || this.canvas.height;
            this.canvas.width  = cssW * opts.scale;
            this.canvas.height = cssH * opts.scale;
            this.ctx.scale(opts.scale, opts.scale);
            this.ctx.clearRect(0, 0, cssW, cssH);
         }

         _tokenize(text) {
            const ligs = Object.keys(this.glyphSet.glyphs)
               .filter(k => k.length > 1)
               .sort((a, b) => b.length - a.length);
            const tokens = [];
            let i = 0;
            while(i < text.length) {
               if(text[i] === ' ') { tokens.push(' '); i++; continue; }
               let matched = false;
               for(const lig of ligs) {
                  if(text.startsWith(lig, i)) { tokens.push(lig); i += lig.length; matched = true; break; }
               }
               if(!matched) { tokens.push(text[i]); i++; }
            }
            return tokens;
         }

         _pickCapture(character, captures) {
            if(captures.length === 0) return null;
            if(captures.length === 1) return captures[0];
            const lastId     = this.lastUsed.get(character);
            const candidates = lastId ? captures.filter(c => c.id !== lastId) : captures;
            const pool       = candidates.length > 0 ? candidates : captures;
            const chosen     = pool[Math.floor(Math.random() * pool.length)];
            this.lastUsed.set(character, chosen.id);
            return chosen;
         }

         _smooth(points) {
            if(points.length < 3) return points;
            return points.map((pt, i) => {
               if(i === 0 || i === points.length - 1) return pt;
               const prev = points[i - 1], next = points[i + 1];
               return { x: (prev.x + pt.x*2 + next.x)/4, y: (prev.y + pt.y*2 + next.y)/4, t: pt.t, p: pt.p };
            });
         }

         _buildSequence(text, opts) {
            const tokens = this._tokenize(text);
            const seq    = [];
            let xOffset  = 0;
            for(const token of tokens) {
               if(token === ' ') { xOffset += opts.wordGap; continue; }
               const glyph = this.glyphSet.glyphs[token];
               if(!glyph) { console.warn(`[HandwritingAnimator] Missing glyph: "${token}"`); continue; }
               const cap = this._pickCapture(token, glyph.captures);
               if(!cap) continue;
               seq.push({ character: token, capture: cap, xOffset });
               xOffset += glyph.width + opts.letterGap;
            }
            return seq;
         }

         _animate(sequence, opts) {
            return new Promise(resolve => {
               const events = [];
               let globalT  = 0;

               for(const sg of sequence) {
                  const xOrigin = sg.xOffset * opts.capHeight;
                  let capStart  = null;
                  for(const stroke of sg.capture.strokes) {
                     const smoothed = this._smooth(stroke);
                     for(let i = 1; i < smoothed.length; i++) {
                        const prev = smoothed[i-1], curr = smoothed[i];
                        if(capStart === null) capStart = prev.t;
                        events.push({
                           fx: xOrigin + prev.x * opts.capHeight,
                           fy: prev.y  * opts.capHeight,
                           tx: xOrigin + curr.x * opts.capHeight,
                           ty: curr.y  * opts.capHeight,
                           p:  curr.p,
                           t:  globalT + (curr.t - capStart) / opts.speed,
                        });
                     }
                  }
                  const last = sg.capture.strokes.at(-1)?.at(-1);
                  const first = sg.capture.strokes[0]?.[0];
                  const dur = (first && last) ? (last.t - first.t) / opts.speed : 0;
                  globalT += dur + 30 / opts.speed;
               }

               if(events.length === 0) { resolve(); return; }

               const startTime = performance.now();
               let idx = 0;

               const frame = () => {
                  const elapsed = performance.now() - startTime;
                  while(idx < events.length && events[idx].t <= elapsed) {
                     const ev = events[idx++];
                     const lw = opts.minWidth + ev.p * (opts.maxWidth - opts.minWidth);
                     this.ctx.lineCap = this.ctx.lineJoin = 'round';
                     this.ctx.strokeStyle = opts.color;
                     this.ctx.lineWidth   = lw;
                     this.ctx.beginPath();
                     this.ctx.moveTo(ev.fx, ev.fy);
                     this.ctx.lineTo(ev.tx, ev.ty);
                     this.ctx.stroke();
                  }
                  if(idx < events.length) requestAnimationFrame(frame);
                  else resolve();
               };
               requestAnimationFrame(frame);
            });
         }
      }

      // ── Sample glyph set (minimal, for demo without a running backend) ────
      // Each capture has a single stroke drawing the letter in normalized coords.
      // Replace with a real export from the backend for actual use.
      const SAMPLE_GLYPH_SET = buildSampleGlyphSet();

      function buildSampleGlyphSet() {
         // Synthetic glyph data: simple geometric representations
         const makeCapture = (strokes) => ({ id: Math.random().toString(36).slice(2), strokes });
         const pt = (x, y, t, p = 0.6) => ({ x, y, t, p });

         const glyphs = {
            'H': { character: 'H', width: 0.6, captures: [makeCapture([
               [pt(0.05,0,0), pt(0.05,1,80)],
               [pt(0.05,0.5,120), pt(0.55,0.5,180)],
               [pt(0.55,0,220), pt(0.55,1,300)]
            ])] },
            'e': { character: 'e', width: 0.45, captures: [makeCapture([
               [pt(0.05,0.6,0), pt(0.4,0.6,40), pt(0.4,0.35,80), pt(0.25,0.35,110), pt(0.05,0.55,150), pt(0.05,0.75,180), pt(0.25,1.0,220), pt(0.4,0.95,250)]
            ])] },
            'l': { character: 'l', width: 0.22, captures: [makeCapture([
               [pt(0.1,0,0), pt(0.1,1,80)]
            ])] },
            'o': { character: 'o', width: 0.48, captures: [makeCapture([
               [pt(0.24,0.35,0), pt(0.05,0.5,40), pt(0.05,0.75,80), pt(0.24,1.0,120),
                pt(0.43,0.75,160), pt(0.43,0.5,200), pt(0.24,0.35,240)]
            ])] },
            ' ': { character: ' ', width: 0.3, captures: [] },
            'w': { character: 'w', width: 0.6, captures: [makeCapture([
               [pt(0.0,0.35,0),pt(0.1,1.0,50),pt(0.3,0.65,90),pt(0.5,1.0,130),pt(0.6,0.35,180)]
            ])] },
            'r': { character: 'r', width: 0.38, captures: [makeCapture([
               [pt(0.05,0.35,0),pt(0.05,1.0,70)],
               [pt(0.05,0.5,100),pt(0.2,0.35,140),pt(0.35,0.35,170)]
            ])] },
            'd': { character: 'd', width: 0.48, captures: [makeCapture([
               [pt(0.4,0,0),pt(0.4,1.0,100)],
               [pt(0.4,0.35,130),pt(0.25,0.35,160),pt(0.05,0.5,190),pt(0.05,0.75,220),
                pt(0.25,1.0,250),pt(0.4,1.0,280)]
            ])] },
         };

         return { version: 1, captureSetName: 'Sample', glyphs };
      }

      // ── State ─────────────────────────────────────────────────────────────
      const outputCanvas = document.getElementById('output-canvas');
      let glyphSet       = SAMPLE_GLYPH_SET;
      let animator       = new HandwritingAnimator(outputCanvas, glyphSet);
      let renderScale    = 2;
      let isAnimating    = false;

      // ── Controls ──────────────────────────────────────────────────────────
      const speedSlider    = document.getElementById('speed-slider');
      const speedVal       = document.getElementById('speed-val');
      const capHtSlider    = document.getElementById('cap-height-slider');
      const capHtVal       = document.getElementById('cap-height-val');
      const textInput      = document.getElementById('text-input');
      const btnAnimate     = document.getElementById('btn-animate');
      const btnClear       = document.getElementById('btn-clear');
      const statusEl       = document.getElementById('status');

      speedSlider.addEventListener('input', () => {
         speedVal.textContent = parseFloat(speedSlider.value).toFixed(1) + '×';
      });

      capHtSlider.addEventListener('input', () => {
         capHtVal.textContent = capHtSlider.value + 'px';
      });

      document.querySelectorAll('.scale-btn').forEach(btn => {
         btn.addEventListener('click', () => {
            document.querySelectorAll('.scale-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderScale = parseInt(btn.dataset.scale);
         });
      });

      btnAnimate.addEventListener('click', async () => {
         if(isAnimating) return;
         const text = textInput.value.trim();
         if(!text) return;
         isAnimating = true;
         btnAnimate.disabled = true;
         animator = new HandwritingAnimator(outputCanvas, glyphSet);
         await animator.write(text, {
            speed:     parseFloat(speedSlider.value),
            capHeight: parseInt(capHtSlider.value),
            scale:     renderScale,
         });
         isAnimating = false;
         btnAnimate.disabled = false;
      });

      textInput.addEventListener('keydown', e => {
         if(e.key === 'Enter') btnAnimate.click();
      });

      btnClear.addEventListener('click', () => {
         const ctx = outputCanvas.getContext('2d');
         ctx.clearRect(0, 0, outputCanvas.width, outputCanvas.height);
      });

      // ── Backend loading ───────────────────────────────────────────────────
      const apiUrlInput = document.getElementById('api-url');
      const setSelect   = document.getElementById('set-select');
      const btnLoad     = document.getElementById('btn-load');

      async function loadSets() {
         const base = apiUrlInput.value.trim().replace(/\/$/, '');
         try {
            const res  = await fetch(`${base}/capture-sets`);
            const sets = await res.json();
            setSelect.innerHTML = '<option value="">— select set —</option>';
            for(const s of sets) {
               const opt = document.createElement('option');
               opt.value = `${base}/capture-sets/${s.id}/export`;
               opt.textContent = s.name;
               setSelect.appendChild(opt);
            }
            setStatus(`Loaded ${sets.length} capture set(s)`, 'ok');
         }
         catch(e) { setStatus('Could not reach backend', 'err'); }
      }

      setSelect.addEventListener('change', async () => {
         const url = setSelect.value;
         if(!url) return;
         try {
            const res  = await fetch(url);
            glyphSet   = await res.json();
            animator   = new HandwritingAnimator(outputCanvas, glyphSet);
            setStatus(`Loaded: ${glyphSet.captureSetName} (${Object.keys(glyphSet.glyphs).length} glyphs)`, 'ok');
         }
         catch(e) { setStatus('Failed to load glyph set', 'err'); }
      });

      btnLoad.addEventListener('click', loadSets);

      function setStatus(msg, cls = '') {
         statusEl.textContent  = msg;
         statusEl.className    = cls;
      }
   </script>
</body>
</html>
